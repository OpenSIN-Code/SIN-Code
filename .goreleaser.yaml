# .goreleaser.yaml — signed, SBOM-attested releases
version: 2

project_name: sin-code

builds:
  - id: sin-code
    main: ./cmd/sin-code
    binary: sin-code
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    # Build-time version injection. ALL three variables live in
    # cmd/sin-code/internal/version.go. main.go re-exports
    # internal.Version as main.Version for the root cobra command.
    # Do NOT split this across main.* and internal.* — Go's linker is
    # case-sensitive and a typo (e.g. main.version vs main.Version)
    # silently does nothing. Verified under go build 1.22+ and 1.23+.
    ldflags:
      - -s -w
      - -X github.com/OpenSIN-Code/SIN-Code/cmd/sin-code/internal.Version={{ .Version }}
      - -X github.com/OpenSIN-Code/SIN-Code/cmd/sin-code/internal.commit={{ .ShortCommit }}
      - -X github.com/OpenSIN-Code/SIN-Code/cmd/sin-code/internal.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# SBOM for every archive (syft must be on PATH in CI)
sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.spdx.json"
    cmd: syft
    args: ["$artifact", "--output", "spdx-json=$document"]

# Keyless cosign signing (OIDC via GitHub Actions)
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--yes"
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
    artifacts: checksum

release:
  draft: false
  prerelease: auto
  footer: |
    ## Verify this release

    ```sh
    cosign verify-blob \
      --certificate checksums.txt.pem \
      --signature checksums.txt.sig \
      --certificate-identity-regexp "github.com/OpenSIN-Code/SIN-Code" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      checksums.txt
    sha256sum -c checksums.txt --ignore-missing
```

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
