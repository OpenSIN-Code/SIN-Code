# Merge this into ~/.hermes/config.yaml
# or let `sin init hermes --scope global` handle it automatically.

mcp_servers:
  sin:
    command: "sin"
    args: ["serve"]
    tools:
      include:
        - impact
        - semantic_diff
        - semantic_review
        - architectural_debt
        - verify_tests
        - prove
        - mock_env
