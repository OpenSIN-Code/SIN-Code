[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sin-code-bundle"
version = "0.2.0"
description = "Structural intelligence for AI coding agents: impact analysis, semantic diff, architectural-debt breaker, and an independent verification Oracle — over MCP."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "OpenSIN-Code" }]
keywords = ["mcp", "ai-agents", "coding-agent", "opencode", "codex", "lsp", "swe-bench"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Quality Assurance",
]

# Core runtime dependencies only — subsystems installed separately (editable).
# Full install order:
#   pip install -e ../SIN-Code-Semantic-Codebase-Knowledge-Graphs
#   pip install -e ../SIN-Code-Intent-Based-Diffing
#   pip install -e ../SIN-Code-Proof-of-Correctness
#   pip install -e ../SIN-Code-Ephemeral-Full-Stack-Mocking-Orchestration
#   pip install -e ../SIN-Code-Architectural-Debt-Watchdogs
#   pip install -e ../SIN-Code-Verification-Oracle
#   pip install -e ../SIN-Code-Orchestration
#   pip install -e ../SIN-Code-Review-Interface
#   pip install -e .
dependencies = [
  "typer>=0.12",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
lsp = [
  "multilspy>=0.0.10",
  "tree-sitter>=0.21",
  "tree-sitter-languages>=1.10",
]
bench = [
  "datasets>=2.19",
]
mcp = [
  "mcp[cli]>=1.2",
]
otel = [
  "opentelemetry-sdk>=1.25",
  "opentelemetry-exporter-otlp>=1.25",
]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.5",
]
all = [
  "sin-code-bundle[lsp,bench,mcp,otel]",
]

[project.urls]
Homepage = "https://github.com/OpenSIN-Code/SIN-Code-Bundle"
Issues = "https://github.com/OpenSIN-Code/SIN-Code-Bundle/issues"

[project.scripts]
sin = "sin_code_bundle.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
sin_code_bundle = ["data/codocs/*.md"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
